{% set name = "llama-index-llms-openai" %}
{% set version = "0.7.9" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
    sha256: f54a24b717134c86e724007057a06a84394f019d1f01e918b624894e208a86df
  # https://github.com/run-llama/llama_index/issues/10806
  - url: https://raw.githubusercontent.com/run-llama/llama_index/main/LICENSE
    sha256: 24f40b5190fdacabc24ddbb5f76364d15e4f030925220ea300d8a2dd4993c8cb

build:
  number: 0
  # llama-index-core doesn't support Python 3.14+ because of dataclasses-json, which is unmaintainable anymore,
  # and does not support Python 3.14+ as well (https://github.com/lidatong/dataclasses-json/issues/568)
  skip: true # [py<310 or py>313]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - llama-index-core >=0.14.5,<0.15
    - openai >=1.108.1,<3

test:
  imports:
    - llama_index.llms.openai
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://www.llamaindex.ai
  summary: llama-index llms openai integration
  description: |
    llama-index-llms-openai is a LlamaIndex integration package that provides
    OpenAI LLM support. It allows using OpenAI's language models within the
    LlamaIndex framework for building LLM-powered applications.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  doc_url: https://developers.llamaindex.ai/python/framework/
  dev_url: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/llms/llama-index-llms-openai

extra:
  recipe-maintainers:
    - jan-janssen
    - pavelzw
