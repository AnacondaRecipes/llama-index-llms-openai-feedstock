{% set name = "llama-index-llms-openai" %}
{% set version = "0.6.23" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_index_llms_openai-{{ version }}.tar.gz
    sha256: 4208404bbf6c5a18bed2079df9333f4ba931e5b8c6c6a407abe2c47c14ac7b7e
  # https://github.com/run-llama/llama_index/issues/10806
  - url: https://raw.githubusercontent.com/run-llama/llama_index/main/LICENSE
    sha256: 24f40b5190fdacabc24ddbb5f76364d15e4f030925220ea300d8a2dd4993c8cb

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - llama-index-core >=0.14.5,<0.15
    - openai >=1.108.1,<3

test:
  imports:
    - llama_index.llms.openai
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://llamaindex.ai
  summary: llama-index llms openai integration
  description: |
    llama-index-llms-openai is a LlamaIndex integration package that provides
    OpenAI LLM support. It allows using OpenAI's language models within the
    LlamaIndex framework for building LLM-powered applications.
  license: MIT
  license_file: LICENSE
  doc_url: https://docs.llamaindex.ai/en/stable/
  dev_url: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/llms/llama-index-llms-openai

extra:
  recipe-maintainers:
    - jan-janssen
    - pavelzw
